name: Reusable - ArgoCD Sync

on:
  workflow_call:
    inputs:
      deploy-environment:
        description: dev or prod
        required: true
        type: string
      app-name:
        description: Primary ArgoCD Application name to sync
        required: true
        type: string
      additional-apps:
        description: Comma-separated additional ArgoCD apps to sync
        required: false
        default: ""
        type: string
    secrets:
      ARGOCD_AUTH_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy-environment == 'prod' && 'production' || 'dev' }}
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Sync ArgoCD application
        env:
          ARGOCD_SERVER: ${{ vars.ARGOCD_SERVER || 'argocd.invest-iq.online' }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          PRIMARY: ${{ inputs.app-name }}
          EXTRA: ${{ inputs.additional-apps }}
          DEPLOY_ENV: ${{ inputs.deploy-environment }}
        run: |
          set -uo pipefail
          if [ -z "$ARGOCD_AUTH_TOKEN" ]; then
            if [ "$DEPLOY_ENV" = "dev" ]; then
              echo "::warning::ARGOCD_AUTH_TOKEN is not set — skipping explicit ArgoCD sync."
              echo "GitOps auto-merge will reconcile dev; add ARGOCD_AUTH_TOKEN to enable forced sync."
              exit 0
            fi
            echo "::error::ARGOCD_AUTH_TOKEN is required for prod ArgoCD sync"
            exit 1
          fi
          # Best-effort forced sync. CI commits to GitOps and ArgoCD's automated
          # selfHeal reconciles regardless, so a CLI connectivity issue (e.g. gRPC
          # through the NLB) must NOT fail the deploy. We try an immediate sync and
          # warn if the CLI cannot reach the server.
          sync_ok=true
          if ! timeout 60 argocd login "$ARGOCD_SERVER" \
                --auth-token "$ARGOCD_AUTH_TOKEN" --grpc-web --insecure; then
            sync_ok=false
          fi
          if [ "$sync_ok" = "true" ]; then
            APPS="$PRIMARY"
            if [ -n "$EXTRA" ]; then
              APPS="$APPS $(echo "$EXTRA" | tr ',' ' ')"
            fi
            for app in $APPS; do
              echo "Syncing $app (${DEPLOY_ENV}) ..."
              argocd app sync "$app" --grpc-web --async || argocd app sync "$app" --grpc-web || sync_ok=false
              argocd app wait "$app" --grpc-web --health --timeout 600 || true
            done
          fi
          if [ "$sync_ok" = "true" ]; then
            echo "ArgoCD explicit sync completed."
          else
            echo "::warning::Explicit ArgoCD sync could not reach ${ARGOCD_SERVER}; relying on ArgoCD automated selfHeal to reconcile ${DEPLOY_ENV}."
          fi
