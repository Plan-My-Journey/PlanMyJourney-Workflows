name: Reusable - Dev Deploy Backend Service

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      chart:
        required: true
        type: string
      image-name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: true
        type: string
      image-tag:
        required: true
        type: string
      argocd-app:
        required: true
        type: string
      additional-charts:
        required: false
        default: ""
        type: string
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV:
        required: true
      AWS_DEPLOY_ROLE_ARN_PROD:
        required: true
      GITOPS_PAT:
        required: true
      ARGOCD_AUTH_TOKEN:
        required: false

jobs:
  build-scan:
    uses: ./.github/workflows/_docker-build.yml
    with:
      service-name: ${{ inputs.service-name }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.context }}

  publish:
    needs: [build-scan]
    uses: ./.github/workflows/_docker-publish.yml
    with:
      image-name: ${{ inputs.image-name }}
      tag: ${{ inputs.image-tag }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.context }}
      deploy-environment: dev
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  cd-dev:
    needs: [publish]
    uses: ./.github/workflows/_cd.yml
    with:
      chart: ${{ inputs.chart }}
      image-tag: ${{ inputs.image-tag }}
      deploy-environment: dev
      values-file: values-dev.yaml
      additional-charts: ${{ inputs.additional-charts }}
    secrets:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}

  argocd-dev:
    needs: [cd-dev]
    uses: ./.github/workflows/_argocd-sync.yml
    with:
      deploy-environment: dev
      app-name: ${{ inputs.argocd-app }}
      additional-apps: ${{ inputs.additional-charts != '' && format('dev-{0}', inputs.additional-charts) || '' }}
    secrets:
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}

  smoke-test:
    needs: [argocd-dev]
    uses: ./.github/workflows/_smoke-test.yml
    with:
      target-environment: dev
      ecr-image: ${{ inputs.image-name }}
      ecr-tag: ${{ inputs.image-tag }}
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  record-artifact-validation:
    needs: [smoke-test]
    uses: ./.github/workflows/_record-artifact-validation.yml
    with:
      service-name: ${{ inputs.service-name }}
      artifact-tag: ${{ inputs.image-tag }}
      artifact-type: container
