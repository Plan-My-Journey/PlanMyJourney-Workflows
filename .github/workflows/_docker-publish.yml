name: Reusable - Docker Publish (ECR)

on:
  workflow_call:
    inputs:
      image-name:
        description: ECR repository path under registry (e.g. ai-travel/ai-service)
        required: true
        type: string
      tag:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: false
        default: "."
        type: string
      deploy-environment:
        description: dev or prod — derived from branch (dev or main)
        required: true
        type: string
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV:
        required: true
      AWS_DEPLOY_ROLE_ARN_PROD:
        required: true
    outputs:
      image-uri:
        description: Full pushed image URI
        value: ${{ jobs.publish.outputs.image-uri }}

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy-environment == 'prod' && 'production' || 'dev' }}
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.deploy-environment == 'prod' && secrets.AWS_DEPLOY_ROLE_ARN_PROD || secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        id: push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          URI="$REGISTRY/${{ inputs.image-name }}:${{ inputs.tag }}"
          docker build -f "${{ inputs.dockerfile }}" -t "$URI" "${{ inputs.context }}"
          docker push "$URI"
          echo "image-uri=$URI" >> "$GITHUB_OUTPUT"
          echo "Pushed $URI"
