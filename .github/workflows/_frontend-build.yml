name: Reusable - Frontend Static Build

on:
  workflow_call:
    inputs:
      api-url:
        required: false
        default: https://api.invest-iq.online
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ inputs.api-url }}
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1
