name: Reusable - Frontend S3 + CloudFront Deploy

on:
  workflow_call:
    inputs:
      deploy-environment:
        description: dev or prod
        required: true
        type: string
      frontend-bucket:
        required: true
        type: string
      cloudfront-distribution-id:
        required: true
        type: string
      artifact-tag:
        description: Immutable artifact tag, e.g. sha-<commit>
        required: true
        type: string
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV:
        required: true
      AWS_DEPLOY_ROLE_ARN_PROD:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy-environment == 'prod' && 'production' || 'dev' }}
    steps:
      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: frontend-dist
          path: build

      - uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ inputs.deploy-environment == 'prod' && secrets.AWS_DEPLOY_ROLE_ARN_PROD || secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}

      - name: Sync static assets to S3
        env:
          BUCKET: ${{ inputs.frontend-bucket }}
          TAG: ${{ inputs.artifact-tag }}
        run: |
          set -euo pipefail
          aws s3 sync build/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp build/index.html "s3://${BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"
          aws s3 sync build/ "s3://${BUCKET}/artifacts/${TAG}/" \
            --delete \
            --cache-control "max-age=31536000,immutable"
          cat > deployment.json <<EOF
          {
            "artifact_tag": "${TAG}",
            "commit": "${{ github.sha }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run": "${{ github.run_id }}"
          }
          EOF
          aws s3 cp deployment.json "s3://${BUCKET}/.deployments/${TAG}.json"
          aws s3 cp deployment.json "s3://${BUCKET}/.deployments/active.json"

      - name: Invalidate CloudFront cache
        if: inputs.cloudfront-distribution-id != 'PLACEHOLDER' && inputs.cloudfront-distribution-id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ inputs.cloudfront-distribution-id }}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Frontend deployed to s3://${{ inputs.frontend-bucket }}"
          echo "Artifact tag: ${{ inputs.artifact-tag }}"
