name: Reusable - Platform Release Tag

on:
  workflow_call:
    inputs:
      version:
        description: Semantic version without v prefix (e.g. 1.0.0)
        required: true
        type: string

jobs:
  tag:
    name: Create platform release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Push annotated platform tag
        env:
          RAW: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${RAW#v}"
          TAG="platform-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Platform release ${TAG}"
          git push origin "$TAG"
          echo "Pushed ${TAG}"
