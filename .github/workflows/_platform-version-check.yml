name: Reusable - Platform Release Version Check

on:
  workflow_call:
    inputs:
      version:
        description: Semantic version without v prefix (e.g. 1.0.0)
        required: true
        type: string

jobs:
  check:
    name: Validate platform release version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Validate semver and platform tag uniqueness
        env:
          RAW: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${RAW#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '${RAW}' is not valid semver (expected X.Y.Z or vX.Y.Z)"
            exit 1
          fi
          git fetch --tags --force >/dev/null 2>&1 || true
          TAG="platform-v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Release tag ${TAG} already exists"
            exit 1
          fi
          LATEST="$(git tag -l 'platform-v*' | sed 's|^platform-v||' | sort -V | tail -n1)"
          if [ -n "$LATEST" ]; then
            HIGHEST="$(printf '%s\n%s\n' "$LATEST" "$VERSION" | sort -V | tail -n1)"
            if [ "$VERSION" = "$LATEST" ] || [ "$HIGHEST" != "$VERSION" ]; then
              echo "::error::Version ${VERSION} must be strictly greater than platform-v${LATEST}"
              exit 1
            fi
          fi
          echo "Release version ${VERSION} accepted (platform tag will be ${TAG})."
