name: Reusable - Quality Gate

on:
  workflow_call:
    inputs:
      lint-result:
        required: true
        type: string
      sast-result:
        required: true
        type: string
      sca-result:
        required: false
        default: skipped
        type: string
      trivy-result:
        required: false
        default: skipped
        type: string
      sonar-quality-gate-failed:
        required: false
        default: "false"
        type: string
      snyk-critical-found:
        required: false
        default: "false"
        type: string
      snyk-high-found:
        required: false
        default: "false"
        type: string
    outputs:
      passed:
        description: true when all required checks passed
        value: ${{ jobs.gate.outputs.passed }}

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Evaluate CI results
        id: check
        env:
          LINT: ${{ inputs.lint-result }}
          SAST: ${{ inputs.sast-result }}
          SCA: ${{ inputs.sca-result }}
          TRIVY: ${{ inputs.trivy-result }}
          SONAR_QG: ${{ inputs.sonar-quality-gate-failed }}
          SNYK_CRITICAL: ${{ inputs.snyk-critical-found }}
          SNYK_HIGH: ${{ inputs.snyk-high-found }}
        run: |
          set -euo pipefail
          fail=0
          for name in LINT SAST SCA TRIVY; do
            val="${!name}"
            if [ "$val" = "skipped" ]; then
              echo "$name: skipped"
              continue
            fi
            if [ "$val" != "success" ]; then
              echo "::error::Quality gate failed on $name ($val)"
              fail=1
            else
              echo "$name: passed"
            fi
          done
          if [ "$SONAR_QG" = "true" ]; then
            echo "::error::SonarCloud quality gate failed"
            fail=1
          fi
          if [ "$SNYK_CRITICAL" = "true" ] || [ "$SNYK_HIGH" = "true" ]; then
            echo "::error::Snyk found High/Critical dependency vulnerabilities"
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "passed=true" >> "$GITHUB_OUTPUT"
          echo "Quality gate passed."
