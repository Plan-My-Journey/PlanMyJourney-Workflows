name: Reusable - Release Backend Service

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      image-name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: true
        type: string
      version:
        description: Release version without v prefix (e.g. 1.2.0)
        required: true
        type: string
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV:
        required: true
      AWS_DEPLOY_ROLE_ARN_PROD:
        required: true

jobs:
  build-scan:
    uses: ./.github/workflows/_docker-build.yml
    with:
      service-name: ${{ inputs.service-name }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.context }}

  publish:
    needs: [build-scan]
    uses: ./.github/workflows/_docker-publish.yml
    with:
      image-name: ${{ inputs.image-name }}
      tag: v${{ inputs.version }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.context }}
      deploy-environment: prod
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  service-tag:
    needs: [publish]
    uses: ./.github/workflows/_tag.yml
    with:
      service-name: ${{ inputs.service-name }}
      version: ${{ inputs.version }}
