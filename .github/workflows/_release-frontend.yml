name: Reusable - Release Frontend

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      source-bucket:
        required: true
        type: string
      destination-bucket:
        required: true
        type: string
      cloudfront-distribution-id:
        required: true
        type: string
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV:
        required: true
      AWS_DEPLOY_ROLE_ARN_PROD:
        required: true

jobs:
  promote:
    uses: ./.github/workflows/_frontend-s3-promote.yml
    with:
      source-bucket: ${{ inputs.source-bucket }}
      destination-bucket: ${{ inputs.destination-bucket }}
      cloudfront-distribution-id: ${{ inputs.cloudfront-distribution-id }}
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
      AWS_DEPLOY_ROLE_ARN_PROD: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}

  service-tag:
    needs: [promote]
    uses: ./.github/workflows/_tag.yml
    with:
      service-name: frontend
      version: ${{ inputs.version }}
