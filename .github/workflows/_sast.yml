name: Reusable - SAST (SonarCloud)

on:
  workflow_call:
    inputs:
      service-path:
        description: Service path for SonarCloud sources scope
        required: true
        type: string
      sonar-project-key:
        required: false
        default: Plan-My-Journey_planmyjourney-app
        type: string
      sonar-organization:
        required: false
        default: plan-my-journey
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
    outputs:
      quality-gate-failed:
        description: true if SonarCloud quality gate failed
        value: ${{ jobs.sonar.outputs.quality-gate-failed }}

jobs:
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      quality-gate-failed: ${{ steps.gate.outputs.quality-gate-failed }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Ensure SonarCloud project is configured
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT: ${{ inputs.sonar-project-key }}
        run: |
          set -euo pipefail
          curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/authentication/validate" >/dev/null
          ORG="$(curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/components/show?component=${PROJECT}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['component']['organization'])")"
          echo "Resolved SonarCloud organization: ${ORG}"
          echo "sonar_organization=${ORG}" >> "$GITHUB_ENV"
          echo "Making project public (required for free SonarCloud analysis)..."
          curl -sf -X POST -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/projects/update_visibility?project=${PROJECT}&visibility=public"
          if curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/project_branches/list?project=${PROJECT}" \
            | grep -q '"name":"master"'; then
            echo "Renaming SonarCloud branch master -> main..."
            curl -sf -X POST -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/project_branches/rename?project=${PROJECT}&name=master&newName=main"
          fi
          curl -sf -X POST -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/project_branches/set_main_branch?project=${PROJECT}&branch=main" \
            || echo "Main branch will be set after first main analysis."
          echo "SonarCloud project ready."

      - name: SonarCloud Scan
        id: scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.sonar_organization }}
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.sources=${{ inputs.service-path }}
            -Dsonar.python.version=3.12
            -Dsonar.newCode.referenceBranch=main
            -Dsonar.qualitygate.wait=false
            -Dsonar.exclusions=**/tests/**,**/__pycache__/**,**/.venv/**,**/node_modules/**

      - name: Record quality gate result
        id: gate
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT: ${{ inputs.sonar-project-key }}
        run: |
          if [ "${{ steps.scan.outcome }}" != "success" ]; then
            echo "quality-gate-failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESPONSE="$(curl -sf -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${PROJECT}" || true)"
          if [ -z "${RESPONSE}" ]; then
            echo "::warning::Scan uploaded but quality gate status could not be read. Check token permissions in SonarCloud."
            echo "quality-gate-failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          STATUS="$(python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])" <<< "${RESPONSE}")"
          echo "SonarCloud Quality Gate status: ${STATUS}"
          if [ "${STATUS}" = "OK" ]; then
            echo "quality-gate-failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Quality Gate is ${STATUS}. See https://sonarcloud.io/project/overview?id=${PROJECT}"
            echo "quality-gate-failed=true" >> "$GITHUB_OUTPUT"
          fi
