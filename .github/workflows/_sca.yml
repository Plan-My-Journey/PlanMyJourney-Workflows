name: Reusable - SCA (Snyk)

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-path:
        required: true
        type: string
      runtime:
        required: false
        default: python
        type: string
    secrets:
      SNYK_TOKEN:
        required: true
    outputs:
      critical-found:
        description: true if critical vulnerabilities were found
        value: ${{ jobs.sca.outputs.critical-found }}

jobs:
  sca:
    runs-on: ubuntu-latest
    outputs:
      critical-found: ${{ steps.scan.outputs.critical-found }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        if: inputs.runtime == 'python'
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: inputs.runtime == 'node'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ inputs.service-path }}/package-lock.json

      - name: Install Python dependencies
        if: inputs.runtime == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ inputs.service-path }}/requirements.txt"

      - name: Install Node dependencies
        if: inputs.runtime == 'node'
        working-directory: ${{ inputs.service-path }}
        run: npm ci

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk security gate (CRITICAL)
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          cd "${{ inputs.service-path }}"
          if [ "${{ inputs.runtime }}" = "node" ]; then
            FILE="package.json"
            PM="npm"
          else
            FILE="requirements.txt"
            PM="pip"
          fi
          if snyk test --severity-threshold=critical --file="$FILE" --package-manager="$PM"; then
            echo "critical-found=false" >> "$GITHUB_OUTPUT"
          else
            echo "critical-found=true" >> "$GITHUB_OUTPUT"
            echo "::error::Snyk found CRITICAL dependency vulnerabilities in ${{ inputs.service-name }}"
            exit 1
          fi
