name: Reusable - Terraform

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      action:
        required: false
        default: plan
        type: string
      tfvars_file:
        required: true
        type: string
      working_directory:
        required: false
        default: .
        type: string
    secrets:
      AWS_DEPLOY_ROLE_ARN_DEV:
        required: true
      AWS_DEPLOY_ROLE_ARN_PROD:
        required: true

env:
  TF_VERSION: "1.7.4"

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.environment == 'production' && secrets.AWS_DEPLOY_ROLE_ARN_PROD || secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive

      - name: Terraform init (validate)
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -backend=false && terraform validate

      - name: Terraform init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ inputs.working_directory }}
        run: terraform plan -var-file=${{ inputs.tfvars_file }} -out=tfplan -no-color | tee plan.txt

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}/tfplan

  apply:
    runs-on: ubuntu-latest
    needs: [plan]
    if: inputs.action == 'apply'
    environment: ${{ inputs.environment == 'production' && 'production' || 'dev' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.environment == 'production' && secrets.AWS_DEPLOY_ROLE_ARN_PROD || secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working_directory }}

      - name: Terraform apply
        working-directory: ${{ inputs.working_directory }}
        run: terraform init && terraform apply -auto-approve tfplan
