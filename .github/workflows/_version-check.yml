name: Reusable - Release Version Check

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  check:
    name: Validate version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semver, ordering and tag uniqueness
        env:
          NEW: ${{ inputs.version }}
          SVC: ${{ inputs.service-name }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$NEW" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$NEW' is not valid semver (expected X.Y.Z)"
            exit 1
          fi
          git fetch --tags --force >/dev/null 2>&1 || true
          TAG="${SVC}-v${NEW}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists"
            exit 1
          fi
          LATEST="$(git tag -l "${SVC}-v*" | sed "s|^${SVC}-v||" | sort -V | tail -n1)"
          if [ -z "$LATEST" ]; then
            echo "First release for ${SVC}: ${NEW} accepted."
            exit 0
          fi
          HIGHEST="$(printf '%s\n%s\n' "$LATEST" "$NEW" | sort -V | tail -n1)"
          if [ "$NEW" = "$LATEST" ] || [ "$HIGHEST" != "$NEW" ]; then
            echo "::error::Version ${NEW} must be strictly greater than ${LATEST}"
            exit 1
          fi
          echo "Version ${NEW} accepted (previous: ${LATEST:-none})."
