name: Reusable — Build & Push

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: us-east-1
      ecr_prefix:
        required: false
        type: string
        default: ai-travel
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      AWS_ROLE_ARN:
        required: true

env:
  AWS_REGION: ${{ inputs.aws_region }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff && ruff check services/ || true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci && npm run typecheck
        working-directory: frontend

  build-push:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: frontend, context: frontend, dockerfile: docker/frontend/Dockerfile }
          - { name: ai-service, context: services/ai-service, dockerfile: docker/ai-service/Dockerfile }
          - { name: travel-service, context: services/travel-service, dockerfile: docker/travel-service/Dockerfile }
          - { name: user-service, context: services/user-service, dockerfile: docker/user-service/Dockerfile }
          - { name: utility-service, context: services/utility-service, dockerfile: docker/utility-service/Dockerfile }
    permissions:
      id-token: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ inputs.ecr_prefix }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ inputs.ecr_prefix }}/${{ matrix.service.name }}:latest
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ inputs.ecr_prefix }}/${{ matrix.service.name }}:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

  frontend-build:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci && npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.invest-iq.online
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1
