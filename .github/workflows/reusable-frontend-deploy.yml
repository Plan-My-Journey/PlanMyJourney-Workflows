name: Reusable — Frontend Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: us-east-1
      frontend_bucket:
        required: true
        type: string
      cloudfront_distribution_id:
        required: true
        type: string
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      AWS_ROLE_ARN:
        required: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
      - name: Sync static assets to S3
        run: |
          aws s3 sync build/ s3://${{ inputs.frontend_bucket }}/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp build/index.html s3://${{ inputs.frontend_bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ inputs.cloudfront_distribution_id }} \
            --paths "/*"
      - name: Deployment summary
        run: echo "Frontend deployed to s3://${{ inputs.frontend_bucket }} (${{ inputs.environment }})"
